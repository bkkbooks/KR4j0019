body:
  text: 和清真詞宋方千里撰瑞龍吟樓前路愁對萬點風花數行煙樹依依斜日紅收草山翠接平蕪盡處小留佇還是畫欄憑暖半扄朱户簾櫳儘日無人消凝悵望時時自語堪恨行雲難繫賦情楊桞徘徊猶舞追想向來歡娛懷抱非故題紅寄緑魂斷江南句何時見輕衫霧唾芳茵蓮步燕子西飛去為人試道相思悶緒空有腸千縷清淚滿斑斑多于春雨忍看鬢髮密堆飛絮瑣窗寒燕子池塘黃鸝院落海棠庭户東風暗許借與輕風柔雨奈春光困人正濃畫欄小立慵無語念冶遊時節融怡天氣異鄉愁旅朝草凝情處嘆聚散悲歡嵗常十五連飛並羽未抵鴛朋鳯侣算章臺楊栁尚存楚娥鬢影依舊否再相逢拚解雕鞍燕樂同杯俎風流子春色遍橫塘年華巧過雨溼殘陽正一帶翠搖嫩莎平野萬枝紅滴繁杏低牆惱人是燕飛盤軟舞鶯語咽輕簧還憶舊遊禁煙寒食共追清賞曲水流觴回思歡娛處人空老花影尚占西廂堪惜翠眉環坐雲鬢分行看戀栁煙光遮絲藏絮妬花風雨飄粉吹香都為酒驅歌使應也無妨渡江雲長亭今古道水流暗響渺渺雜風沙倦遊驚嵗晚自歎相思萬里夢還家愁凝望結但掩淚慵整鉛華更漏長酒醒人語睥睨有啼鴉傷嗟回腸千縷淚眼雙垂遏離情不下還暗思香翻香燼深閉窗紗依稀看遍江南畫記隱隱煙靄蒹葭空健羡缺鴛鴦共宿叢花應天長嫩黃上栁新緑漲池東風豔冶天色又見乍晴還雨年華傍寒食春依舊身是客對麗景易傷岑寂悵凝望一帶平蕪剪就茵藉前度少年場醉記旗亭聨句遍窗壁調笑映牆紅粉參差水邊宅蘆鞭懶過故陌恨未老漸成塵迹謾無語立盡斜陽懷抱誰識荔枝香勝日登臨幽趣乘興去翠壁古木千章林影生寒霧空濛冷溼人衣山路元無雨深澗斗瀉飛泉溜甘乳漁唱晚看小棹歸前浦笑指官橋風颭酒旗斜舉還脫宫袍一醉芳杯倒鸚鵡幸有雕章蠟炬又小園花梢雨歇浪羞泫碧瓦光霽羅幕香浮鶯啼燕語交加是處池館春遍風外認得笙歌近逺醉魂半縈夜酒吹未散暗憶年時正日赴西池宴笑攜豔質郢曲新聲妙如剪有愁容易排遣還京樂嵗華慣每到和風麗日歡再理為妙歌新調粲然一曲千金輕費記夜闌沉醉更衣換酒珠璣委悵畫燭搖影易積銀盤紅淚向笙歌底問何人能道平生聚合歡娛離别興味誰憐露浥煙籠盡栽培豔桃穠李謾縈牽空坐隔千山情遙萬水縱有丹青筆應難摹畫憔悴掃花遊野亭話别恨露草芊綿曉風酸楚怨絲恨縷正楊花碎玉滿城雪舞耿耿無言暗灑闌干淚雨片帆去縱百種避愁愁早知處離思都幾許但漸慣征塵斗迷歸路亂山似俎更重江浪渺易沈書素瞪目銷魂自覺孤吟調苦小留佇隔前村數聲簫鼓解連環素封誰託空寒潮浪疊亂山雲邈對倦景無語消魂但香斷露晞絮飛風薄杜宇聲中動多少客情離索繞闌干佇立暗記那回賞遍花藥依依嵗華自若更低煙草草殘照孤角嘆息故里春光有幽圃名園算也間却早早歸休漸過了芳條華萼趂良時按歌喚舞舊家院落玲瓏四犯傾國名姝似暈雪勻酥無限嬌豔素質間姿天賦淡蛾豐臉還是睡起慵粧顧鬢影翠雲零亂悵平生把鑒驚換依約瑣窗逢見繡幃凝想鴛鴦薦畫屏烘獸煙蔥蒨依紅傍粉憐香玉聊慰風流眼空嘆倦客斷腸奈聽徹殘更急點仗夢魂一到花月底休飄散丹鳯吟宛轉回腸離緒懶倚危欄愁登高閣相思何處人在繡幃羅幕芳年豔齒枉消虛過會合絲輕因緣蟬薄暗想飛雲驟雨霧隔煙遮相去還是天角悵望不時夢到素書謾説波浪惡縱有青青髮漸吳霜粧點容易凋鑠歡期何晚忽忽坐驚搖落顧影無言清淚溼但絲絲盈握染斑客袖歸日須問著滿江紅為憶仙姿相思恨纒綿未足從别後沈郎消瘦帶圍如束消息三年沈過處關山千里無飛肉算誰知中有不平心彈碁局空想像金叉卜時展玩回紋曲許何時重到瑣窗華屋長得一生花裏活軟紅深處鴛鴦宿也勝如騎馬著征衫京塵撲瑞鶴仙看青山繞郭更草草萋萋疏煙漠漠無風自花落欲黃昏誰向官樓吹角剛腸頓弱恨别來辜負厚約想香閨念舊還憶去年共舉杯酌寂莫光隂虛度未説離愁淚痕先閣珠簾翠幕除相見是竒藥況中年巳後憑高臨逺情懷終是易惡早歸休月地雲階賸追笑樂西平樂倦踏征塵厭驅匹馬凝望故國猶賒孤館今宵亂山何許平林漠漠煙遮悵過眼光隂似瞬回首歡娛異昔流年迅景霜風敗葦驚沙無奈輕離易别千里意刷淚獨長嗟綺窗人逺青門信杳敘影何時重見雲斜空怨憶吹簫韻曲旋錦回文想像宫商蠧損機杼生塵誰為新裝暈素華那信自憐悠揚夢蝶浮沒書鱗縱有心情盡為相思爭如傍早歸家浪淘沙素秋霽雲橫曠野浪拍孤堞柔櫓悲聲頓發驪歌恨曲未闋念一寸回腸千縷結栁條在忍使攀折但悵惘章臺路多少相思拚愁絶淒切去程浩渺空濶奈斷梗孤篷西風外蓛蓛殘吹咽應暗為行人傷念離别淚波易竭凝怨懷羞覩當時明月煙浪無窮青山疊魚封逺雁書漸歇甚時合金叉分處缺謾飄蕩海角天涯再見日應憐兩鬢玲瓏雪憶舊遊念花邊玉漏帳裏鸞笙曽欵良宵鏤鴨吹香霧更輕風動竹韻響瀟瀟畫簷皓月初挂簾幕縠紋搖記罷曲更衣挑燈細語酒暈全消迢迢舊時路縱下馬銅駝誰聽揚鑣奈可憐庭院又徘徊虛過清夢難招斷魂暗想幽會回首渺星橋試倣佛仙源重尋當日千樹桃驀山溪園林晴晝花上黃蜂尾鶯語怯遊人又還傍緑楊深避曲池斜徑草色碧於藍欄倦倚簾半起魂斷斜陽裏江南春盡渺渺平橋水身在一天涯問此恨何時是巳飛帆輕槳催送莫愁來歌舞地尊酒底不羡東鄰美少年遊丹青間展小屏山香燼一絲寒織錦回紋生綃紅淚不語自羞看相思念逺關河隔終日望征鞍不識單栖忍教良夜魂夢覓長安又東風無力揚輕絲芳草雨餘姿淺緑還池輕黃歸栁老去願春遲欄干憑暖慵回首間把小花枝怯酒情懷惱人天氣消瘦有誰知秋蕊香一枕盤鶯錦暖初起懶勻粧面緑雲裊娜映嬌眼酒入桃腮暈淺翠簾半捲香縈線礙飛燕畫屏淺立意間逺春瑣深沈小院漁家傲燭彩花光明似晝羅幃夜出傾城秀紅錦紋茵雙鳯鬭看舞後腰肢宛勝章臺栁眼尾春嬌波態溜金樽笑捧纖纖袖一陳粉香吹散酒更漏久消魂獨自歸時候又冷葉啼螿聲惻惻銀床曉起清霜積魂斷江南煙水國書難得相思此意無人識緑鬢金叉年少客愁來懶傍菱花仄霧閣雲窗間枕席情何適杯盈珠淚還偷滴南鄉子西北有高樓淡靄殘煙漸漸收幾陳涼風生客袖颼颼心逐年華衮衮流花卉滿前頭老懶心情萬事休獨倚欄干無一語回眸鼓角聲中喚起愁望江南春色莫短艇艤長堤飛絮空隨花上下啼鶯占斷水東西來往燕爭泥桑柏緑歸去覓前蹊夜甕酒香從蟻鬭曉窗眠足任雞啼猶勝旅情悽浣沙溪楊柳依依窣地垂麴塵波影漸平池霏微細雨出魚兒先自别來容易瘦那堪春去不勝悲腰肢寬盡縷金衣又無數流鶯逺近飛垂楊裊裊弄晴暉斷腸聲裏送春歸鬢影空思香霧溼襪塵還想步波微去年花下酒闌時又清淚斑斑著意垂消魂迢遞一天涯誰能萬里布長梯先自樓臺飛粉絮可堪簾幕捲金泥相思心上乳鶯啼迎春樂參差鳯鐸鳴高屋漸驚覺清眠熟看夕陽倒影花隂速雙燕子歸來宿幾曲危腸愁易束問雪鬢何時重緑料想此情同應暗損香肌玉又紅深緑暗春無迹芳心蕩冶遊客記搖鞭跋馬銅駝陌凝睇認珠簾側絮滿愁城風捲白遞多少相思消息何處約歡期芳草外高樓北點絳唇池館春深海棠枝上斑斑雨酒旗斜舉風滚楊花絮遊子征衫憑暖闌干處空凝佇杜鵑啼苦還報南樓鼓一落索月影娟娟明秀簾波吹皺徘徊空度可憐宵謾問道因誰瘦不見芳音長久鱗鴻空有渭城西路恨依然尚夢想青青栁又心抵江蓮長苦凌波人去厭厭消瘦不勝衣恨清淚多於雨舊曲慵歌瓊樹誰傳香素碧溪流水過樓前問紅葉來何處垂絲釣錦鱗繡羽難傳愁態顰嫵岸草際天雲影垂絮人何許謾並欄倚柱煙光莫悵榆錢滿路送春殢酒歡期幽會希遇彩簫鳯侣回首分攜處雙臉吹愁雨無限語再見時記否滿庭芳山色澄秋水光融日浮萍飄碎還圓數行征雁分破白鷗煙高下回塘暗谷寫幽思終日濺濺間凝望殘霞暝靄何處一漁船江南思舊隱筠軒野徑茆舍疏椽慣攜壺花下欹帽風前想像淵明舊節琴中趣何必疏絃歸歟計不將五斗輸與北窗眠隔浦蓮垂楊煙溼嫩葆别嶼環清窈紺影浮新漲夷猶終日魚鳥花妥庭下草鳴蟬閙暗緑藏臺沼野軒小欹眠斷夢間書風葉顛倒詩懷酒思悔費十年昏曉投老紅塵倦再到愁覺悠然心寄天表法曲獻仙音庭葉飄寒砌蛩催織夜色迢迢難度細剔燈花再添香獸凄涼洞房朱户見鳯枕羞孤另相思灑紅雨有誰語道年來為郎憔悴音問隔回首後期尚阻寂莫兩愁山鎖間情無限顰嫵嫩雪消肌試羅衣寬盡腰素問何時夢裏趂得好風飛去過秦樓栁灑鵝黃草揉螺黛院落雨痕才斷蜂鬢霧溼燕嘴泥融陌上細風頻扇多少豔景關心長苦春光疾如飛箭對東風忍負西園清賞翠深香逺空暗憶醉走銅駝間敲金鐙倦迹素衣塵染因花瘦覺為酒情鍾緑鬢幾番催變何況逢迎向人眉黛供愁嬌波回倩料相思此際濃似飛紅萬點或作濃于空裏亂紅千點側犯四山翠合一溪碧繞秋容靚波定見鷺立魚跳動平鏡修竹散步屧古木通幽徑風靜煙霧直池塘倒晴影流年舊事老矣塵心瑩還暗省點吳霜憔悴愧潘令夢憶江南小園路迥愁聽葉落轆轤金井塞翁吟莫色催更鼓庭户月影朧􅀈記舊迹玉樓東看枕上芙容雲屏幾軸江南畫香篆燼暖煙空睡起處繡衾重尚殘酒潮紅忡忡從分散歌稀宴少懷麗質渾如夢中苦寂莫離情萬緒似秋後怯雨芭蕉不展愁封何時細語此夕相思曽對西風蘇幕遮扇留風氷却暑夏木隂隂相對黃鸝語薄晚輕隂還閣雨逺岸煙深倣佛菱歌舉燕歸來花落去幾度逢迎幾度傷羈旅油壁西陵人識否好約追涼小艤蒹葭浦浣沙溪菱藕花開來路香滿船絲竹載西涼波搖髮彩粉生光翡翠雙飛尋密浦鴛鴦濃睡倚回塘間情須與酒商量又密約深期卒未成藏鈎春酒坐頻傾向人嬌艷夜亭亭相顧無言情易覺歸來單枕夢猶驚眼梢怨淚幾時晴又面面虛堂水照空天然一朵玉芙容千嬌百媚語惺惚未散嬌雲輕嚲鬢欲融輕雪乍凝胸石榴裙衩為誰紅又刻樣衣裳巧刻繒綵枝環繞萬年藤生香吹透縠蠶氷嫩水帶山嬌不斷溼雲堆嶺膩無聲香肩婀娜許誰憑點絳唇間蕩蘭舟翠娥仙袂風中舉鴛鴦深浦緑暗曽來路留戀荷香薄晚慵歸去還相顧練波澄素月上潮生處訴衷情逺山重疊亂山盤江上晚風酸秋容更兼殘日楓葉照人丹書未到夢猶間鬢先斑憑高無語征雁知愁聲斷雲間風流子河梁攜手别臨岐語共約踏青歸自雙燕再來斷無音信海棠開了還又參差料此際笑隨花便面醉騁錦鄣泥不憶故園粉愁香怨忍教華屋緑慘紅悲舊家歌舞地生疏久塵暗鳯縷羅衣何限可憐心事難訴歡期但兩點愁蛾才開重斂幾行清淚欲制還垂爭表為郎憔悴相見方知華胥引長亭無數羈客將歸故園換葉乳鴨隨波輕蘋滿渚時共唼接眼春色何窮更櫓聲伊軋思憶前歡未言心巳愁怯欺鬢吳霜恨惺惺又還盈鑷錦紋魚素那堪重翻再閲粉指香痕依舊在繡裳鴛篋多少相思皺成眉上千疊清都宴莫色聞津鼓煙波碧數行征雁時度輕榔聚網長歌和楫水村漁户行人又落天涯但悵望高陽伴侣記舊日酒卸宫袍馬酬少妾詞賦如今鬢影蕭然相逢似雪徒話愁苦芳塵暗陌殘花遍野嵗華空去垂楊翠拂門徑尚夢想當時住處縱早歸緑漸成隂青娥在否四園竹花驄縱策制淚掩斜扉玉爐細裊鴛被半間蕭瑟羅幃銀漏聲那更雜疏疏雨裏此時懷抱誰知恨凄其西窗自剪寒花沈吟暗數歸期最愛深情密意無限當年往復詩辭千萬紙甚近日人來字漸稀齊天樂碧紗窗外黃鸝語聲聲似愁春晚岸栁飄綿庭花墮雪惟有平蕪如剪重門向掩看風動疏簾浪鋪湘簟暗想前歡舊遊心事寄詩卷鱗鴻音信未覩夢魂尋訪後關山又隔無限客館愁思天涯倦迹幾許良宵展轉間情意逺記密閣深閨繡衾羅薦睡起無人料應眉黛斂木蘭花溶溶水映娟娟秀淺約宫粧籠翠袖舞餘楊栁乍縈風睡起海棠猶帶酒憔悴蕭郎緣底瘦那日花前相見後西窗疑是故人來費得羅箋詩幾首霜葉飛塞雲垂地堤煙重燕鴻初度江表露荷風栁向人疏臺榭還清悄恨脈脈離情怨曉相思魂夢眼屏小奈倦客征衣自遍拂塵埃玉鏡羞照無限靜陌幽坊追歡尋賞未落人後先到少年心事轉頭空況老來懷抱儘緑葉紅英過了離聲慵整當時調問麗質從憔悴消減腰圍似郎多少蕙蘭芳庭院雨晴倚斜照睡餘雙鶩正學染修蛾官栁細勻黛緑繡簾半捲透笑語瑣窗華屋帶脆聲咽韻逺近時聞絲竹乍著單衣才拈圓扇氣候暄燠趂驕馬香車同按繡坊畫曲人生如寄浪勤耳目歸醉鄉猶勝旅情愁獨塞垣春四逺天垂野向晚景雕鞍卸吳藍滴草塞綿藏栁風物堪畫對雨收霧霽初晴也正陌上煙光灑聽黃鸝啼紅樹短長音如寫懷抱幾多愁年時趂歡會幽雅盡日足相思奈春晝難夜念征塵滿堆襟袖那堪更獨遊花隂下一别鬢毛減鏡中霜滿把丁香結煙溼高花雨藏低葉為誰翠消紅隕歎水流波迅撫艷景尚有輕隂餘潤乳鶯啼處路思歸意淚眼暗忍青青榆莢滿地縱買間愁難盡勾引正記著年時乍怯春寒陳陳小閣幽窗殘粧賸粉黛眉曽暈迢遞魂夢萬里恨斷柔腸寸知何時重見空為相思瘦損氐州第一朝日融怡天氣豔冶桃英杏萼猶小燕壘初營蜂衙乍散池面煙光縹眇芳草如􅝪更瀲灔波光相照錦繡縈回丹青映發未容春老倦客自嗟清興少念歸計夢魂飛繞浪濶魚沈雲高雁阻瞪目添愁抱憶香閨臨麗景無人伴輕顰淺笑想像消魂怨東風孤衾獨曉解蹀躞院宇無人晴晝靜看簾波舞自憐春晚漂流尚羈旅那況淚溼征衣恨添客鬢終日子規聲苦動離緒謾徘徊愁步何時再相遇舊歡如昨匆匆楚臺雨别後南北天涯夢魂猶記關山屢隨書去少年遊人如穠李香濛翠縷芳酒嫩於橙寶燭烘香珠簾間夜銀宇理鸞笙歸時醉面春風醒花霧隔疏更低輾雕輪輕攏驕馬相伴月中行慶春宫宿靄籠晴層雲遮日送春望斷愁城籬落堆花簾櫳飛絮更堪逺近鶯聲嵗華流轉似行蟻盤旋萬星人生如寄利鎖名韁何用勞縈駸駸皓髮相迎斜照難留朝霧多零宜趂良辰何妨高會為酬月皎風清舞臺歌榭遇得旅歡期易成莫辭杯酒天賦吾曹特地鍾情醉桃源良宵相對一燈青相思寫砑綾去時情淚滴紅氷西風吹涕零愁宛轉意飛騰晴窗穿紙蠅夢知關塞不堪行憶君猶問程又鴛鴦濃睡碧溪沙荷花深處家快風收電掣金蛇涼波流素華吳國豔楚宫娃紅潮連翠霞坐來忽忽燭光斜城頭聞亂鴉點絳唇緑葉隂隂滿城風雨催梅潤畫樓人近朝霧來芳信從解雕鞍休數花吹陳無多悶燕催鶯趂付與春歸恨夜遊宫一帶垂楊蘸水映芳草萋萋千里跋馬回堤少年子擁青蛾向紅樓南酒市拚飲鶯花底恣歡笑粉融香墜不趂臨分醉中起但依稀寫柔情留蜀紙又城上昏煙四斂畫樓外陡聽更點千里相思夢中見恨年華逐東流隨急箭簾影參差轉夜初過水沈煙亂賸枕餘衾故人逺憶間窗嚲雲鬢低粉面訴衷情一鈎新月淡於霜楊柳漸分行征塵厭堆襟袂雞唱促晨裝淮水闊楚山長暗悲傷重陽天氣杯酒黃花還寄他鄉傷情怨間愁眉上翠小儘春衫寬了舞鑑孤鸞嚴粧羞獨照王孫音信尚渺度寒食禁煙須到趂賞芳菲今年春事早紅林檎近花幕高燒燭獸爐深炷香寒色上樓閣春威遍池塘多情天孫罷織故與玉女穿窗素臉淺約宫裝風韻勝笙簧遊冶尋舊侣尊酒老吾鄉清歌度曲何妨塵落雕梁任瑶階平尺珠簾人報賸拚酩酊飛羽觴又曉起山光慘晚來花意寒映月衣纎縞因風佩琅玕三弄江梅聽徹幾點岸柳飄殘宛然舞曲初翻簾影捲波瀾把酒同喚醉促膝小留歡清狂痛飲能消多少杯盤況人生如寄相逢半老嵗華休作容易看滿路花簾篩月影金風捲楊花雪天邊鴻雁少音塵絶春光欲莫客心歸心折江湖波浪闊目斷家山料應易過佳節柔情千點杜宇枝頭血危腸餘寸許誰能接眠思夢憶不似今畨切欲對何人説攬鏡沈吟瘦來須有差别解語花長空淡碧素魄凝輝星斗寒相射鳯樓鴛瓦天風動冉冉珮環高下歌清韻雅對好景芳樽滿把花霧濃燈火瑩煌笑語烘蘭麝千斛明珠照夜況人如圖畫明豔容冶繡巾香帕歸來路緩逐杏韉驕馬笙歌散也愁萬炬絳蓮分謝更漏殘驚聽西樓吹小梅初罷六么令照人明豔肌雪消繁燠嬌雲慢垂柔領紺髮濃於沐微暈紅潮一線拂拂桃腮熟羣芳難逐天香國豔試比春蘭共秋菊當時相見恨晚彼此縈心目别後空憶仙姿路隔吹簫玉何處欄干十二縹眇陽臺曲佳期重卜都將離恨拚與尊前細留囑倒犯盡日任梧桐自飛翠階慵掃間雲散縞秋容瑩莫天清窈斜陽到地樓閣參差簾櫳悄嫩袖舞涼颸拂拂生林表蕩塵襟寫名醥攜手故園勝事尋蹤松篁幽徑窵曲沼瞰靜緑蔭簷影龜魚小信倦迹歸來好倩叮嚀長安遊子道鬢髮霜侵莫待菱花照醉鄉深處老大酺正夕陽間秋光淡鴛瓦參差華屋高低簾幕迥但風搖環珮細聲頻觸瘦怯單衣涼生兩袖零亂庭梧窗竹相思誰能會是歸程客夢路諳心熟況時節黃昏間門人靜憑欄身獨歡情何太速嵗華似飛馬馳輕轂謾自歎河陽青鬢苒苒如霜把菱花悵然凝目老去疏狂減思墮策小坊幽曲趂遊樂繁華國回首無緒清淚紛於紅菽話愁更堪剪燭玉燭新海棠海棠初雨後似露粉粧成肉紅團就太真帳裏春眠醒緩蹙樓前宫漏潮生酒暈獨自倚闌干時候吹鬢影斜立東風餘寒半侵羅袖驪山宫殿無人想笑問君王豔容如否萬花競鬭難比並麗美巧勻豐瘦閨房挺秀一顧丹鉛低首應對羯鼓聲中清歌美奏花犯荷花渚風低芙蓉萬朵清妍賦情味霧綃紅綴看曼立分行間淡佳麗靚姿豔冶相扶倚高低紛愠喜正曉色懶窺粧面嬌眠欹翠被秋色為花且徘徊朱顔迎縞露還應憔悴腰肢小腮痕嫩更堪飄墜風流事舊宫暗鎖誰復見塵生香步裏謾歎息玉兒何許繁華空逝水醜奴兒凌波臺畔花如剪幾點吳霜煙淡雲黃東閣何人見晚粧江南春近書千里誰寄清香别墅橫塘鼓角聲中又夕陽水龍吟海棠錦城春色移根麗姿迥壓江南地瓊酥拂臉彩雲滿袖羣芳羞避雙燕來時莫寒庭院雨藏煙閉正朝眠未足宫粧尚怯還輕灑燕脂淚長是歡遊花底怕東風陡成怨吹高燒銀燭梁州催按歌聲漸起緑態多慵紅情不語動搖人意算吳宫獨步昭陽第一可依稀比六醜看流鶯度栁似急響金梭飛擲護巢占泥翩翩飛燕翼昨夢前迹暗數歡娛處豔花幽草縱冶遊南國芳心蕩漾如波澤繫馬青門停車紫陌年華轉頭堪惜奈離襟别袂容易疏隔人間春寂謾雲容莫碧逺水沈雙鯉無信息天涯漸老羈客嘆良宵漏斷獨眠愁極吳霜皎半侵華幘誰復省十載勻香暈粉髻傾鬟側相思意不離潮汐想舊家接酒巡歌計今難再得虞美人花臺響徹歌聲暖白日林中短春心搖蕩客魂消搓粉揉香排比一團嬌重來猶自尋芳徑吹鬢東風影步金蓮處緑苔封不見彩雲雙袖舞驚鴻又高樓逺閣花飛遍急雨梢池面翛翛楊栁不知門多少亂鶯啼處暮煙昏銀鈎小字題芳絮宛轉回文語可憐單枕夢行雲腸斷江南千里未歸人蘭陵王晚煙直池沼波痕皺碧年芳為花態栁情挼粉柔藍釀春色繁華記上國曽識傾城幼客風流事聨句送鈎箋緑綃紅遞書尺行雲去無迹念暖響歌臺香霧瑶席當時誰信盟言食知一嵗離聚幾多間阻人生如夢寄堠驛況分散南北悲惻萬愁積奈鸞鳯歡疏魚雁音寂天涯何處相思極但目斷芳草恨隨塞笛那堪庭院更聽得夜雨滴蝶戀花漏泄東君消息後短葉長條著意遮軒牖嫩比鵝黃初熟酒染勻巧費春風手萬縷篩金新月透入夜柔情還勝朝來秀綵筆雕章知幾首可人標韻無新舊又一搦腰肢初見後恰似娉婷十五藏朱牖春色惱人濃抵酒風前脈脈如招手黛染修眉蛾緑透態婉儀間自是閨房秀堪惜年華同轉首女郎臺畔春依舊又碎玉飛花寒食後薄影行風終日穿疏牖有客思歸還把酒間吹倦絮輕粘手雪滿愁城寒欲透飄盡殘英翠幄成穠秀張緒風流今白首少年襟度難如舊又翠浪藍光新雨後整整斜斜高下籠窗牖萬斛深傾重碧酒量愁知落何人手籠霧梳煙晴色透照影回風一段嫣然秀白下門東空引首藏鴉枝葉長懷舊西河都會地東南王氣須記龍盤鳯舞到錢塘瑞煙回起畫圖彩筆寫西湖波光溶漾無際翠欄最宜半倚栁隂駿馬誰繫鱗差觀閣接飛翬衙廬萬壘倒空碧􅒓軟琉璃雲收天淨如水夕陽照晚聽近市沸笙簫歡動閭里比屋樂逢堯世好相將載酒尋歌玄對酬畣年華鶯花裏三部樂簾捲窗明聽杜宇乍啼漏聲初絶亂雲收盡天際留殘月奈相送行客將歸悵去程漸促霽色催發斷魂别浦自上孤舟如葉悠悠音信易隔縱怨懷恨語到見時難説堪嗟水流急景霜飛華髮想家山路窮望睫空倚仗魂親夢切不似嫩朵猶能替離緒千結菩薩蠻黃雞曉唱玲瓏曲人生兩鬢無重緑官栁繫行舟相思獨倚樓來時花未發去後紛如雪春色不堪看蕭蕭風雨寒品令露晞煙靜寂寥轉梧桐寒影天際歷歷征鴻近被風吹散聲斷無行陳秋思客懷多少恨謾厭厭誰問暈殘蘭地香消印夢魂長定愁伴更籌盡玉樓春華堂銀燭堆紅淚解説離人多少意恨從别後轉無窮愁到濃時惟一味江南渭北三千里憔悴相思何日巳馬啼清曉草黏天庭院黃昏花滿地滿路花鶯飛翠栁搖魚躍浮萍破班班紅杏子交榴火池臺晝永繚繞花隂褁山色遙供座枕簟清涼北窗時喚高卧翻思少年走馬銅駝左歸來敲鐙月留關鎖年華老矣事逐浮雲過今吾非故我那日尊前秪今問有誰呵和清真詞
