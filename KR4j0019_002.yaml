body:
  text: 和清真詞原跋美成當徽廟時提舉大晟樂府每製一調名流輒依律賡唱獨東楚方千里樂安楊澤民有和清真全詞各一巻或合為三英集行世花菴詞客止選千里過秦樓風流子訴衷情三闋而澤民不載豈揚劣于方耶湖南毛晉識
