body:
  text: 和清真詞詞曲類一詞集之屬提要臣等謹案和清真詞一卷宋方千里撰千里信安人官舒州簽判有題真源宫一詩見藝圃集此則其和周邦彥清真詞也邦彥妙解聲律為詞家之冠所製諸調不獨音之平仄宜遵即仄中上去入三音亦不容相混所謂分析節度深契微芒故千里和詞字字奉為標準集內調名有稍異者如浣溪沙調目録與周詞相同而題則誤作浣沙溪荔枝香周詞作荔枝香近吳文英夢窗稿亦同此集獨少近字浪淘沙周詞作浪淘沙慢蓋浪淘沙製調之始皇甫松惟七言絶句李後主始用雙調亦止五十四字周詞至百三十三字之多故加以慢字此去慢字便非此調蓋皆傳刻之訛非千里之舊又其字句互異者如荔枝香第二調前闋是處池館春遍周詞作但怪燈偏簾卷不惟音異平仄亦殊或周作為但怪簾卷燈遍之訛霜葉飛前闋自遍拂塵埃玉鏡羞照句止九字周詞作透入清輝半晌特地留殘照共十一字則和詞必上脫二字塞垣春前闋結句短長音如寫句止五字周詞作一懷幽恨如寫乃六字句則和詞亦脫一字後闋滿堆襟袖周詞作兩袖珠淚則第二字不用平聲和詞當為堆滿襟袖之誤三部樂前闋天際留殘月句止五字周詞作何用交光明月亦六字句則和詞又脫一字若六醜之分段以人間春寂句屬前半闋之末周詞刻本亦同然證以吳文英此調當為過變之起句則兩本傳刻俱訛也今互勘其異同如左以資考證毛晉跋樂安楊澤民亦有和清真詞或合為三英集行世然晉所刻六十一家之內無澤民詞或其本已佚歟乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
